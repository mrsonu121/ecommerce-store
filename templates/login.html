{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}
<div class="mb-4">

    <a href="javascript:history.back()"
       class="btn btn-outline-dark">

        <i class="bi bi-arrow-left"></i>

        Back

    </a>

</div>
<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow mt-5">

            <div class="card-header bg-dark text-white">

                <h3 class="mb-0">
                    Login
                </h3>

            </div>

            <div class="card-body">

                {% if messages %}

                    {% for message in messages %}

                        <div class="alert alert-danger">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            value="{{ request.POST.username|default_if_none:'' }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <button type="submit" class="btn btn-success w-100">

                        Login

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Don't have an account?

                    <a href="{% url 'register' %}">

                        Register Here

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
