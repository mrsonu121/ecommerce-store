{% extends 'base.html' %}

{% block title %}
Change Password
{% endblock %}

{% block content %}
<div class="mb-4">

    <a href="javascript:history.back()"
       class="btn btn-outline-dark">

        <i class="bi bi-arrow-left"></i>

        Back

    </a>

</div>
<div class="mb-4">

    <a href="javascript:history.back()"
       class="btn btn-outline-dark">

        <i class="bi bi-arrow-left"></i>

        Back

    </a>

</div>

<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>

                    🔒 Change Password

                </h3>

            </div>

            <div class="card-body">

                {% if messages %}

                    {% for message in messages %}

                        <div class="alert alert-success">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Update Password

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
